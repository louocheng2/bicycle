<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永續英雄：單車社交實驗室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bicycle-monopoly.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="glow-text">永續英雄</h1>
            <p class="subtitle">單車社交實驗室：掌握路權，守護安全</p>
        </header>

        <!-- 角色清單 Identity System -->
        <section id="identity-system" class="section-container">
            <h2 class="section-title">角色清單 <span class="en-title">Identity System</span></h2>
            <p class="lab-hint">解鎖角色以查看身份使命</p>
            <div class="identity-grid">
                <div class="identity-card hidden-identity" id="cyclist">
                    <div class="secret-overlay">
                        <span class="overlay-icon">㊙️</span>
                        <span class="overlay-num">01</span>
                    </div>
                    <div class="identity-content">
                        <div class="icon">🚴</div>
                        <h3>單車騎士</h3>
                        <p>強調「駕駛人」身份與用路責任。</p>
                    </div>
                </div>
                <div class="identity-card hidden-identity" id="designer">
                    <div class="secret-overlay">
                        <span class="overlay-icon">㊙️</span>
                        <span class="overlay-num">02</span>
                    </div>
                    <div class="identity-content">
                        <div class="icon">🎨</div>
                        <h3>單車設計師</h3>
                        <p>強調發揮創意改善安全配備。</p>
                    </div>
                </div>
                <div class="identity-card hidden-identity" id="guardian">
                    <div class="secret-overlay">
                        <span class="overlay-icon">㊙️</span>
                        <span class="overlay-num">03</span>
                    </div>
                    <div class="identity-content">
                        <div class="icon">🛡️</div>
                        <h3>城市守護者</h3>
                        <p>從第三方視角守護城市（市長與行人）。</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 5x5 地圖情境 Map Grid -->
        <section id="map-section" class="section-container">
            <h2 class="section-title">地圖情境 <span class="en-title">5x5 Safety Ring</span></h2>
            <div class="board-wrapper">
                <div id="board-grid" class="board-grid-perimeter">
                    <!-- Tiles will be generated by JS -->
                </div>
                <div class="board-center">
                    <div id="center-info-box" class="center-info-box hidden">
                        <h3 id="center-title"></h3>
                        <p id="center-desc"></p>
                    </div>
                    <div id="dice-ui" class="dice-container">
                        <div id="dice" class="dice">
                            <span class="dice-dot"></span>
                        </div>
                        <button id="roll-btn" class="roll-btn">擲骰子 ROLL</button>
                    </div>
                    <div id="game-status" class="game-status">點擊骰子開始安全旅程！</div>
                </div>
                <!-- Player Piece -->
                <div id="player-piece" class="player-piece">🚴</div>
            </div>
        </section>

        <!-- 超能力實驗室 Superpower Lab -->
        <section id="superpower-lab" class="section-container">
            <h2 class="section-title">超能力實驗室 <span class="en-title">Superpower Lab</span></h2>
            <p class="lab-hint">點擊卡牌觸發「禮儀轉譯」</p>
            <div id="power-deck" class="power-deck">
                <!-- Cards will be generated by JS -->
            </div>
        </section>
    </div>

    <!-- Modal for Scenarios -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content glass">
            <button id="close-modal" class="close-btn">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="bicycle-monopoly.js"></script>
</body>
</html>
